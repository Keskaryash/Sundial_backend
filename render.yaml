databases:
  - name: sundial-db
    plan: free
    databaseName: sundial
    user: sundial_user

services:
  - type: web
    name: sundial-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DATABASE_URL
        fromDatabase:
          name: sundial-db
          property: connectionString
